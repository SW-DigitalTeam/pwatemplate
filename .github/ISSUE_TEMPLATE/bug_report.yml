name: Bug report
description: Something is broken
labels: [bug, triage]
body:
  - type: dropdown
    id: environment
    attributes: { label: Environment, options: [production, staging, local] }
    validations: { required: true }
  - type: dropdown
    id: role
    attributes: { label: Your role when it happened, options: [participant, caregiver, teacher, facilitator, school admin, SW programme admin, SW reporting, system admin, tech support] }
    validations: { required: true }
  - type: input
    id: programme
    attributes: { label: Programme, placeholder: e.g. karawhiua }
  - type: input
    id: device
    attributes: { label: Browser and device, placeholder: e.g. Chrome 126, school-managed iPad }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Steps to reproduce }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behaviour }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behaviour }
    validations: { required: true }
  - type: dropdown
    id: frequency
    attributes: { label: How often, options: [every time, sometimes, once] }
  - type: dropdown
    id: severity
    attributes: { label: Severity, description: "Critical: security/data loss/outage · High: core flow unavailable · Medium: degraded with workaround · Low: minor", options: [critical, high, medium, low] }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: "PRIVACY: blur or crop any participant names, emails or survey answers before attaching."
  - type: dropdown
    id: data
    attributes: { label: Could participant data be affected?, options: ["no", "possibly", "yes"] }
    validations: { required: true }
