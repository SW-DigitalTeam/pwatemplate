name: School support request
description: A school needs help (onboarding, access, imports)
labels: [support, school]
body:
  - type: input
    id: school
    attributes: { label: School }
    validations: { required: true }
  - type: input
    id: programme
    attributes: { label: Programme }
  - type: textarea
    id: request
    attributes: { label: "What do they need? (no student names in this ticket)" }
    validations: { required: true }
  - type: dropdown
    id: urgency
    attributes: { label: Urgency, options: [blocking a session today, this week, whenever] }
